# Run SDDM Wayland over Hyprland compositor

[Theme]
CursorTheme=Bibata-Modern-Ice
CursorSize=24

[General]
Numlock=on
HaltCommand=/usr/bin/systemctl poweroff
RebootCommand=/usr/bin/systemctl reboot
DisplayServer=wayland
#GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=xdg-shell
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell

[Users]
DefaultPath=/usr/local/bin:/usr/bin:/bin
HideShells=
HideUsers=
uMaximumUid=60513
MinimumUid=1000
RememberLastUser=true
RememberLastSession=true
ReuseSession=true

[Wayland]
# FIX 1: "start-Hyprland" (capital H) is wrong — binary is lowercase "start-hyprland"
# FIX 2: Arguments to hyprland binary must come AFTER a "--" separator.
#         Without "--", start-hyprland ignores --config and falls back to ~/.config/hypr/hyprland.conf
CompositorCommand=start-hyprland -- --config /usr/share/hypr/sddm/hyprland.conf
EnableHiDPI=true
#SessionCommand=/usr/share/sddm/scripts/wayland-session
#SessionDir=/usr/local/share/wayland-sessions,/usr/share/wayland-sessions
#SessionLogFile=/usr/local/share/sddm/wayland-session.log

[X11]
Enable=false
