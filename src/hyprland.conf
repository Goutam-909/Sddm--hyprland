$CURSOR_THEME=Bibata-Modern-Classic
$CURSOR_SIZE=24

ecosystem {
    enforce_permissions = false
    no_update_news = true
    no_donation_nag = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    initial_workspace_tracking = 1
}

input {
    numlock_by_default = true
    kb_layout = us,de,es
}

cursor {
    no_warps = 1
    no_hardware_cursors = 1
}

# This rules only apply when using xdg-shell https://wiki.archlinux.org/title/SDDM#Wayland
# FIX: windowrulev2 is fully deprecated in 0.53+. Use new windowrule block syntax.
windowrule {
    match:class = ^(sddm-greeter)$
    fullscreen    = on
    no_border     = on
    no_decoration = on
    no_anim       = on
    no_dim        = on
    rounding      = 0
    no_shadow     = on
}

# FIX: hyprlang noerror must NOT be commented out — it's an active config directive,
#      not a comment. When commented, errors ARE thrown for missing optional sources.
hyprlang noerror true
# source a file relative to the current configuration file
source = ./hyprprefs.conf       # Manually create and edit this file
# source from a sddm.conf.d directory
source = /etc/sddm.conf.d/hypr/hyprland.conf  # Manually create and edit this file
hyprlang noerror false

# ! Known issue: The cursor theme and size are not working
exec-once = hyprctl setcursor $CURSOR_THEME $CURSOR_SIZE
env = HYPRCURSOR_THEME,$CURSOR_THEME
env = HYPRCURSOR_SIZE,$CURSOR_SIZE

# KB Layout switcher
# NOTE: $cmd.check uses shell command substitution $(...) which does NOT work as a
#       hyprlang variable — hyprlang only does plain string substitution.
#       Move the logic into an external shell script and call that instead.
#       Example: bind = SUPER, K, exec, ~/.config/hypr/scripts/kb-switch.sh
$cmd.switch = hyprctl switchxkblayout all next -q
bind = SUPER, K, exec, $cmd.switch
