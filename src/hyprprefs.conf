# Manually create this file in the same directory as hyprland.conf
# Add your personal overrides here — this file is sourced at the end of hyprland.conf.
#
# NOTE: kb_layout is already set in hyprland.conf (us,de,es).
#       Defining it again here overrides the parent — which is fine if intentional,
#       but remove one or the other to avoid confusion.
#
# Example: override keyboard layout just for this user
# input {
#   kb_layout = us
# }
